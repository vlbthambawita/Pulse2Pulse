# ============================================
# Pulse2Pulse Training Configuration
# ============================================

# Action: train | retrain | inference | check
action: retrain

# Hardware
device_id: 0

# Experiment
exp_name: pulse2pulse_exp_ptbxl_full_retrain_from_950
out_dir: /work/vajira/DL2026/Pulse2Pulse/output

# Weights & Biases
wandb_project: ECGEN_pulse2pulse_plus_paper

# ============================================
# Dataset
# ============================================
dataset: ptbxl          # simple | ptbxl
ptbxl_path: /work/vajira/DATA/ptb-xl/1.0.3
ptbxl_sampling_rate: 500

# Used only when dataset: simple
data_dirs:
  - /home/vajira/DL/Pulse2Pulse/sample_ecg_data

# Limit samples per split for quick testing (set to null to use all data)
max_samples: null

# ============================================
# Hyper parameters
# ============================================
bs: 32
lr: 0.0001
b1: 0.5
b2: 0.9
num_epochs: 4000
start_epoch: 0
ngpus: 1
checkpoint_interval: 50
model_size: 50
lmbda: 10.0

# Checkpoint path (used for retrain)
checkpoint_path: "/work/vajira/DL2026/Pulse2Pulse/output/pulse2pulse_exp_ptbxl_full/checkpoints/pulse2pulse_exp_ptbxl_full_epoch:950.pt"
